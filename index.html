<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spot It! · AI Solver</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --red:#ff4757;
  --orange:#ff8c00;
  --yellow:#ffd32a;
  --green:#2ed573;
  --teal:#1e90ff;
  --purple:#a55eea;
  --pink:#ff6b9d;
  --bg:#fff9f0;
  --text:#2d2d44;
  --muted:#9898b0;
  --white:#ffffff;
  --card:#ffffff;
  --shadow:rgba(45,45,68,0.12);
}

html{scroll-behavior:smooth}

body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

/* ── CONFETTI DOTS BG ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    radial-gradient(circle,var(--yellow) 2px,transparent 2px),
    radial-gradient(circle,var(--pink) 2px,transparent 2px),
    radial-gradient(circle,var(--teal) 2px,transparent 2px),
    radial-gradient(circle,var(--green) 2px,transparent 2px),
    radial-gradient(circle,var(--purple) 2px,transparent 2px);
  background-size:120px 120px,80px 80px,100px 100px,90px 90px,70px 70px;
  background-position:0 0,40px 40px,20px 70px,60px 10px,10px 50px;
  opacity:0.18;
  pointer-events:none;z-index:0;
}

/* ── RAINBOW TOP BAR ── */
.rainbow-bar{
  height:7px;
  background:linear-gradient(90deg,var(--red),var(--orange),var(--yellow),var(--green),var(--teal),var(--purple),var(--pink));
  width:100%;
}

/* ── SHELL ── */
.shell{
  position:relative;z-index:1;
  max-width:860px;margin:0 auto;
  padding:36px 24px 80px;
}

/* ── HEADER ── */
.header{text-align:center;margin-bottom:40px}

.header-emojis{
  font-size:40px;
  display:flex;justify-content:center;gap:8px;
  margin-bottom:12px;
}
.header-emojis span{
  display:inline-block;
  animation:wobble 2.5s ease-in-out infinite;
}
.header-emojis span:nth-child(1){animation-delay:0s}
.header-emojis span:nth-child(2){animation-delay:.2s}
.header-emojis span:nth-child(3){animation-delay:.4s}
.header-emojis span:nth-child(4){animation-delay:.6s}
.header-emojis span:nth-child(5){animation-delay:.8s}

@keyframes wobble{
  0%,100%{transform:translateY(0) rotate(0deg)}
  25%{transform:translateY(-8px) rotate(-5deg)}
  75%{transform:translateY(-4px) rotate(4deg)}
}

h1{
  font-family:'Baloo 2',cursive;
  font-size:clamp(2.8rem,8vw,4.8rem);
  font-weight:800;
  line-height:1;
  letter-spacing:-1px;
  color:var(--text);
  position:relative;
  display:inline-block;
  margin-bottom:6px;
}

/* Colourful underline */
h1::after{
  content:'';
  display:block;
  height:8px;
  border-radius:4px;
  background:linear-gradient(90deg,var(--red),var(--orange),var(--yellow),var(--green),var(--teal),var(--purple));
  margin-top:4px;
  animation:shimmer 3s linear infinite;
  background-size:200% auto;
}
@keyframes shimmer{0%{background-position:0% center}100%{background-position:200% center}}

.subtitle{
  font-size:16px;color:var(--muted);
  font-weight:600;margin-top:12px;
}

/* ── STAR DIVIDER ── */
.star-row{
  display:flex;align-items:center;gap:10px;
  justify-content:center;margin:20px 0;color:var(--yellow);
  font-size:18px;
}
.star-row::before,.star-row::after{
  content:'';flex:1;max-width:120px;
  height:2px;border-radius:2px;
  background:linear-gradient(90deg,transparent,var(--yellow));
}
.star-row::after{background:linear-gradient(90deg,var(--yellow),transparent)}

/* ── STATUS ── */
.status-wrap{text-align:center;margin-bottom:28px}

.status-pill{
  display:inline-flex;align-items:center;gap:10px;
  border-radius:50px;
  padding:11px 24px;
  font-size:14px;font-weight:800;
  background:var(--white);
  border:3px solid #e8e8f0;
  color:var(--muted);
  box-shadow:0 4px 16px var(--shadow);
  transition:all .4s;
}
.status-pill.ready{
  border-color:var(--green);
  color:var(--green);
  background:#f0fff8;
  box-shadow:0 4px 20px rgba(46,213,115,0.25);
}
.status-pill.error{
  border-color:var(--red);
  color:var(--red);
  background:#fff5f5;
}
.s-dot{
  width:10px;height:10px;border-radius:50%;
  background:currentColor;flex-shrink:0;
}
.status-pill.ready .s-dot{animation:bouncy 1.2s ease-in-out infinite}
@keyframes bouncy{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}

/* ── CONTROLS ── */
.controls{
  display:flex;justify-content:center;gap:14px;
  flex-wrap:wrap;margin-bottom:28px;
}

.btn{
  font-family:'Baloo 2',cursive;
  font-weight:700;font-size:17px;
  border:none;border-radius:18px;
  padding:13px 28px;cursor:pointer;
  display:inline-flex;align-items:center;gap:10px;
  transition:transform .15s,box-shadow .15s;
  position:relative;overflow:hidden;
  letter-spacing:0.3px;
  border-bottom:5px solid rgba(0,0,0,0.15);
}
.btn:hover{transform:translateY(-3px)}
.btn:active{transform:translateY(1px);border-bottom-width:2px}

.btn-cam{
  background:linear-gradient(135deg,#4f8ef7,#5e6cf5);
  color:#fff;
  box-shadow:0 6px 24px rgba(79,142,247,0.4);
}
.btn-upload{
  background:linear-gradient(135deg,#ff6b9d,#ff4757);
  color:#fff;
  box-shadow:0 6px 24px rgba(255,71,87,0.4);
}
.btn-icon{font-size:20px}
input[type=file]{display:none}

/* ── MEDIA CARD ── */
.media-card{
  background:var(--white);
  border-radius:28px;
  overflow:hidden;
  position:relative;
  min-height:260px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 12px 48px var(--shadow),0 0 0 4px rgba(255,211,42,0.3);
  margin-bottom:24px;
  border:3px solid #f0e8ff;
}

/* Sticker dots around the card */
.media-card::before{
  content:'⭐ 🎯 ⭐ 🎯 ⭐ 🎯 ⭐ 🎯 ⭐ 🎯 ⭐ 🎯 ⭐ 🎯 ⭐ 🎯';
  position:absolute;top:-1px;left:0;right:0;
  font-size:11px;text-align:center;
  letter-spacing:4px;opacity:0.25;pointer-events:none;z-index:0;
  white-space:nowrap;overflow:hidden;
}

.ph{
  text-align:center;padding:52px 24px;z-index:1;
  display:flex;flex-direction:column;align-items:center;gap:14px;
}
.ph-circle{
  width:100px;height:100px;border-radius:50%;
  background:linear-gradient(135deg,#fff0d4,#ffd6e8);
  border:4px solid #ffe0c8;
  display:flex;align-items:center;justify-content:center;
  font-size:44px;
  animation:spin-float 4s ease-in-out infinite;
  box-shadow:0 8px 28px rgba(255,140,0,0.2);
}
@keyframes spin-float{
  0%,100%{transform:translateY(0) rotate(-3deg)}
  50%{transform:translateY(-12px) rotate(3deg)}
}
.ph h3{font-family:'Baloo 2',cursive;font-size:18px;color:var(--text)}
.ph p{font-size:14px;color:var(--muted);max-width:220px;line-height:1.6}

#video,#img-el{
  width:100%;display:none;
  border-radius:24px;position:relative;z-index:1;
}
#det-canvas{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:2;border-radius:24px;
}

/* ── RESULTS PANEL ── */
#results{
  display:none;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 12px 48px var(--shadow);
  margin-bottom:28px;
  border:3px solid transparent;
  animation:bounceIn .5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes bounceIn{
  0%{opacity:0;transform:scale(.85) translateY(20px)}
  60%{transform:scale(1.03) translateY(-4px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}

#results.ok-result{border-color:var(--green)}
#results.fail-result{border-color:#ffb3c1}

.r-head{
  padding:20px 28px;
  display:flex;align-items:center;gap:14px;
}
.r-head.ok{
  background:linear-gradient(135deg,#d4fcea,#a8f5d0);
}
.r-head.fail{
  background:linear-gradient(135deg,#ffe0e8,#ffc8d4);
}

.r-head-icon{
  font-size:36px;
  animation:spin-once .5s ease-out;
}
@keyframes spin-once{from{transform:rotate(-20deg) scale(.6)}to{transform:rotate(0) scale(1)}}

.r-head-text{}
.r-head-title{
  font-family:'Baloo 2',cursive;
  font-size:22px;font-weight:800;
  color:var(--text);line-height:1.1;
}
.r-head-sub{font-size:13px;color:var(--muted);font-weight:600;margin-top:2px}

.r-body{
  background:var(--white);
  padding:22px 28px;
}

.r-meta{
  display:flex;align-items:center;gap:10px;
  font-size:14px;color:var(--muted);font-weight:700;
  margin-bottom:18px;
}
.r-chip{
  background:linear-gradient(135deg,var(--orange),var(--yellow));
  border-radius:50px;padding:3px 14px;
  font-size:14px;color:var(--white);font-weight:800;
  box-shadow:0 3px 10px rgba(255,140,0,0.3);
}

.dup-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;list-style:none;
}

.dup-item{
  background:linear-gradient(135deg,#f0fff8,#e0ffee);
  border:2px solid var(--green);
  border-radius:18px;
  padding:12px 16px;
  display:flex;align-items:center;gap:10px;
  animation:popBounce .35s cubic-bezier(.16,1,.3,1) both;
  box-shadow:0 4px 14px rgba(46,213,115,0.2);
}
@keyframes popBounce{
  0%{opacity:0;transform:scale(.7) rotate(-5deg)}
  70%{transform:scale(1.08) rotate(1deg)}
  100%{opacity:1;transform:scale(1) rotate(0)}
}

.dup-emoji{font-size:28px;line-height:1;flex-shrink:0}
.dup-info{flex:1;min-width:0}
.dup-name{
  font-size:13px;font-weight:800;color:var(--text);
  text-transform:capitalize;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.dup-x{
  background:var(--green);color:#fff;
  border-radius:50px;padding:2px 10px;
  font-size:12px;font-weight:900;flex-shrink:0;
  box-shadow:0 2px 8px rgba(46,213,115,0.4);
}

.no-dup{
  text-align:center;padding:12px;
  font-size:16px;font-weight:700;color:var(--red);
}

/* ── FUN FOOTER ── */
footer{
  text-align:center;
  margin-top:20px;
  font-size:13px;color:var(--muted);font-weight:700;
}
.footer-emojis{font-size:20px;margin-bottom:4px}
</style>
</head>
<body>

<div class="rainbow-bar"></div>

<div class="shell">

  <!-- Header -->
  <header class="header">
    <div class="header-emojis">
      <span>🔍</span><span>🎯</span><span>🃏</span><span>⭐</span><span>🎉</span>
    </div>
    <h1>Spot It! AI Solver</h1>
    <p class="subtitle">✨ Upload a card · Let the AI find your symbols! ✨</p>
  </header>

  <div class="star-row">⭐ ⭐ ⭐</div>

  <!-- Status -->
  <div class="status-wrap">
    <div class="status-pill" id="status-pill">
      <div class="s-dot"></div>
      <span id="status-txt">Loading the magic… 🪄</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-cam" id="cam-btn">
      <span class="btn-icon">📷</span> Start Camera
    </button>
    <label class="btn btn-upload">
      <span class="btn-icon">🖼️</span> Upload Card
      <input type="file" id="upload-input" accept="image/*"/>
    </label>
  </div>

  <!-- Media -->
  <div class="media-card" id="media-card">
    <div class="ph" id="ph">
      <div class="ph-circle">🃏</div>
      <h3>No card yet!</h3>
      <p>Upload a Spot It! card or point your camera at one</p>
    </div>
    <video id="video" autoplay playsinline></video>
    <img id="img-el" alt="card"/>
    <canvas id="det-canvas"></canvas>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="r-head" id="r-head">
      <div class="r-head-icon" id="r-icon"></div>
      <div class="r-head-text">
        <div class="r-head-title" id="r-title"></div>
        <div class="r-head-sub" id="r-sub"></div>
      </div>
    </div>
    <div class="r-body">
      <div class="r-meta">
        <span>🎯 Symbols found:</span>
        <span class="r-chip" id="r-count">0</span>
      </div>
      <ul class="dup-grid" id="dup-grid"></ul>
      <div class="no-dup" id="no-dup"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-emojis">🌟 🎮 🤖 🎮 🌟</div>
    Powered by TensorFlow.js &amp; YOLOv8 · 57 Spot It! symbols
  </footer>

</div>

<script>
const classNames=["anchor","apple","baby_bottle","bird","bomb","cactus","candle","carrot","cat","cheese","clock","clown","dinosaur","dog","dolphin","dragon","exclamation_point","eye","fire","flower","four_leaf_clover","ghost","green_splat","hammer","hand","heart","ice_cube","igloo","key","knight","ladybug","leaf","light_bulb","lightning","lips","lock","moon","orange_man","pencil","question_mark","scissors","skull","snowflake","snowman","spider","spider_web","stop_sign","sun","sunglasses","target","taxi","tortoise","treble_clef","tree","water_drop","yin_yang","zebra"];

const emojiMap={anchor:"⚓",apple:"🍎",baby_bottle:"🍼",bird:"🐦",bomb:"💣",cactus:"🌵",candle:"🕯️",carrot:"🥕",cat:"🐱",cheese:"🧀",clock:"🕐",clown:"🤡",dinosaur:"🦕",dog:"🐶",dolphin:"🐬",dragon:"🐉",exclamation_point:"❗",eye:"👁️",fire:"🔥",flower:"🌸",four_leaf_clover:"🍀",ghost:"👻",green_splat:"💚",hammer:"🔨",hand:"✋",heart:"❤️",ice_cube:"🧊",igloo:"🏠",key:"🔑",knight:"♞",ladybug:"🐞",leaf:"🍃",light_bulb:"💡",lightning:"⚡",lips:"👄",lock:"🔒",moon:"🌙",orange_man:"🧡",pencil:"✏️",question_mark:"❓",scissors:"✂️",skull:"💀",snowflake:"❄️",snowman:"⛄",spider:"🕷️",spider_web:"🕸️",stop_sign:"🛑",sun:"☀️",sunglasses:"🕶️",target:"🎯",taxi:"🚕",tortoise:"🐢",treble_clef:"🎵",tree:"🌲",water_drop:"💧",yin_yang:"☯️",zebra:"🦓"};

const MODEL_PATH='./yolov8_tfjs/model.json';
let model,isRunning=false;
const video=document.getElementById('video');
const imgEl=document.getElementById('img-el');
const canvas=document.getElementById('det-canvas');
const ctx=canvas.getContext('2d');

function setStatus(msg,state){
  document.getElementById('status-txt').textContent=msg;
  document.getElementById('status-pill').className='status-pill'+(state?' '+state:'');
}

async function loadModel(){
  try{
    model=await tf.loadGraphModel(MODEL_PATH);
    setStatus('Ready to play! 🎉','ready');
  }catch(e){
    setStatus('Oops! Model not found 😢','error');
    console.error(e);
  }
}

function showResults(detected){
  const counts={};
  detected.forEach(c=>{counts[c]=(counts[c]||0)+1});
  const dups=Object.entries(counts).filter(([,n])=>n>1);

  const panel=document.getElementById('results');
  const head=document.getElementById('r-head');
  const icon=document.getElementById('r-icon');
  const title=document.getElementById('r-title');
  const sub=document.getElementById('r-sub');
  const countEl=document.getElementById('r-count');
  const grid=document.getElementById('dup-grid');
  const noDup=document.getElementById('no-dup');

  panel.style.display='block';
  countEl.textContent=detected.length;
  grid.innerHTML='';noDup.textContent='';

  if(dups.length){
    panel.className='';panel.id='results';panel.classList.add('ok-result');
    head.className='r-head ok';
    icon.textContent='🎉';
    title.textContent='Match Found!';
    sub.textContent=`${dups.length} duplicate symbol${dups.length>1?'s':''} spotted!`;
    dups.forEach(([name,n],i)=>{
      const li=document.createElement('li');
      li.className='dup-item';
      li.style.animationDelay=`${i*0.08}s`;
      li.innerHTML=`<span class="dup-emoji">${emojiMap[name]||'🔹'}</span><div class="dup-info"><div class="dup-name">${name.replace(/_/g,' ')}</div></div><span class="dup-x">×${n}</span>`;
      grid.appendChild(li);
    });
  }else{
    panel.classList.add('fail-result');
    head.className='r-head fail';
    icon.textContent='🤔';
    title.textContent='No Duplicates!';
    sub.textContent='Every symbol appears just once.';
    noDup.textContent='❌ No duplicate symbols found on this card.';
  }
}

async function detect(src){
  if(!model)return;
  canvas.width=src.clientWidth||src.width;
  canvas.height=src.clientHeight||src.height;
  const[mW,mH]=[640,640];
  tf.engine().startScope();
  const inp=tf.browser.fromPixels(src);
  const resized=tf.image.resizeBilinear(inp,[mW,mH]).div(255).expandDims(0);
  const pred=await model.executeAsync(resized);
  const trans=pred.transpose([0,2,1]).squeeze();
  const raw=trans.arraySync();
  const boxes=[],scores=[],cls=[];
  for(const row of raw){
    const cs=row.slice(4);
    const ms=Math.max(...cs);
    const ci=cs.indexOf(ms);
    if(ms>0.3){
      const[cx,cy,w,h]=row;
      boxes.push([cy-h/2,cx-w/2,cy+h/2,cx+w/2]);
      scores.push(ms);cls.push(ci);
    }
  }
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(boxes.length){
    const nms=await tf.image.nonMaxSuppressionAsync(boxes,scores,20,.45,.3);
    const sel=nms.dataSync();
    const finalCls=Array.from(sel).map(i=>classNames[cls[i]]||'Unknown');
    const counts={};finalCls.forEach(c=>{counts[c]=(counts[c]||0)+1});

    for(let i=0;i<sel.length;i++){
      const idx=sel[i];
      const b=boxes[idx];
      const sc=(scores[idx]*100).toFixed(0);
      const name=classNames[cls[idx]]||'Unknown';
      const isDup=counts[name]>1;
      const ymin=(b[0]/mH)*canvas.height;
      const xmin=(b[1]/mW)*canvas.width;
      const ymax=(b[2]/mH)*canvas.height;
      const xmax=(b[3]/mW)*canvas.width;
      const rW=xmax-xmin,rH=ymax-ymin;

      const col=isDup?'#2ed573':'#ff4757';
      const label=`${name.replace(/_/g,' ')} ${sc}%`;

      ctx.font='bold 15px Arial,sans-serif';
      const tw=ctx.measureText(label).width+20;
      const th=26;

      // Glow for dups
      if(isDup){ctx.shadowColor='#2ed573';ctx.shadowBlur=14}

      // Box
      ctx.strokeStyle=col;
      ctx.lineWidth=isDup?4:2.5;
      ctx.strokeRect(xmin,ymin,rW,rH);
      ctx.shadowBlur=0;

      // Label background — solid dark for max readability
      const lx=xmin;
      const ly=ymin-th-2;
      ctx.fillStyle='rgba(0,0,0,0.82)';
      if(ctx.roundRect)ctx.roundRect(lx,ly,tw,th,6);
      else ctx.rect(lx,ly,tw,th);
      ctx.fill();

      // Colored left accent strip
      ctx.fillStyle=col;
      ctx.fillRect(lx,ly,5,th);

      // Label text — white, bold, large
      ctx.fillStyle='#ffffff';
      ctx.font='bold 14px Arial,sans-serif';
      ctx.fillText(label,lx+12,ly+17);
    }
    if(!isRunning)showResults(finalCls);
  }
  tf.engine().endScope();
  if(isRunning)requestAnimationFrame(()=>detect(video));
}

document.getElementById('cam-btn').addEventListener('click',async()=>{
  if(isRunning){
    video.srcObject.getTracks().forEach(t=>t.stop());
    video.style.display='none';
    document.getElementById('cam-btn').innerHTML='<span class="btn-icon">📷</span> Start Camera';
    isRunning=false;
  }else{
    imgEl.style.display='none';
    document.getElementById('results').style.display='none';
    document.getElementById('ph').style.display='none';
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    video.srcObject=stream;video.style.display='block';
    document.getElementById('cam-btn').innerHTML='<span class="btn-icon">⏹️</span> Stop Camera';
    video.onloadeddata=()=>{isRunning=true;detect(video)};
  }
});

document.getElementById('upload-input').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  if(isRunning)document.getElementById('cam-btn').click();
  const r=new FileReader();
  r.onload=ev=>{
    imgEl.src=ev.target.result;
    imgEl.style.display='block';
    document.getElementById('ph').style.display='none';
    imgEl.onload=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);detect(imgEl)};
  };
  r.readAsDataURL(f);
});
